<head>
  <link rel="stylesheet" href="/css/server-page/welcomeMessage.css" />
</head>

<header>
  <div id="activeWelcomeMessageContainer">
    <h2>Active Welcome Message</h2>
    <table id="activeWelcomeMessage">
      <tr>
        <th>Color</th>
        <th>Channel</th>
        <th>Title</th>
        <th>Message</th>
        <th></th>
      </tr>
    </table>
  </div>

  <div id="confirmationDIV" style="display: none" class="confirmation">
    <form id="confirmationForm">
      <h2>Continue with process?</h2>
      <p>Are you sure you want to delete this reaction role?</p>
      <input type="submit" name="response" value="Yes" />
      <input type="submit" name="response" value="No" />
    </form>
  </div>

  <div class="reactionRoleDiv">
    <form id="welcomeMessageForm">
      <h1>Welcome Messages</h1>
      <select required name="channelID" id="channel">
        <option value="" disabled selected>Select text channel</option>
      </select>
      <input placeholder="Title" type="text" name="title" id="title" />
      <input type="color" name="color" id="favcolor" />
      <textarea name="message" id="message"></textarea>
      <input
        id="toggleWelcomeMessage"
        type="submit"
        value="Enable Welcome Messages"
      />
    </form>
  </div>
</header>
